<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MSK Lead Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg: #0a0a0c;
    --card: #121214;
    --section: #18181c;
    --coral: #f97316;
    --coral-hover: #ea580c;
    --text: #f5f5f5;
    --muted: #a1a1aa;
    --border: #27272a;
    --green: #22c55e;
    --amber: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 0 0 100px 0;
    min-height: 100vh;
}
.header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
}
.header h1 { font-size: 1.3rem; color: var(--coral); margin-bottom: 4px; }
.header .sub { font-size: 0.8rem; color: var(--muted); }
.goals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px;
    background: var(--section);
    border-bottom: 1px solid var(--border);
}
.goal {
    background: var(--card);
    border-radius: 10px;
    padding: 12px;
    border: 1px solid var(--border);
}
.goal .label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
}
.goal .value { font-size: 1.4rem; font-weight: 700; }
.goal .value.coral { color: var(--coral); }
.goal .value.green { color: var(--green); }
.goal .bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
}
.goal .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
}
.goal .bar-fill.coral { background: var(--coral); }
.goal .bar-fill.green { background: var(--green); }
.goal .small { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
.template-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 12px 16px;
    padding: 12px;
}
.template-box .label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
}
.template-box textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 10px;
    font-size: 0.85rem;
    resize: vertical;
    min-height: 70px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.template-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.btn-coral { background: var(--coral); color: #fff; }
.btn-coral:hover { background: var(--coral-hover); }
.btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
}
.btn-outline:hover { background: var(--card); }
.btn-sms { background: var(--green); color: #000; }
.btn-call { background: var(--blue); color: #fff; }
.btn-export {
    background: transparent;
    border: 1px dashed var(--coral);
    color: var(--coral);
    font-size: 0.75rem;
}
.filters {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    align-items: center;
}
.filters input {
    flex: 1;
    min-width: 120px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.85rem;
}
.filters select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.8rem;
    max-width: 150px;
}
.filters .count { font-size: 0.75rem; color: var(--muted); margin-left: auto; }
.lead-list { padding: 8px 16px; }
.lead-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.lead-card .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
}
.lead-card .info { flex: 1; min-width: 0; }
.lead-card .name {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.lead-card .category {
    font-size: 0.7rem;
    color: var(--coral);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.lead-card .phone {
    font-size: 0.8rem;
    color: var(--text);
    margin-top: 2px;
}
.lead-card .status { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.status-pending { background: var(--section); color: var(--muted); }
.status-done { background: rgba(34,197,94,0.15); color: var(--green); }
.status-replied { background: rgba(59,130,246,0.15); color: var(--blue); }
.status-interested { background: rgba(234,179,8,0.15); color: var(--amber); }
.status-meeting { background: rgba(249,115,22,0.15); color: var(--coral); }
.status-no { background: rgba(239,68,68,0.15); color: var(--red); }
.lead-card .actions { display: flex; gap: 6px; flex-wrap: wrap; }
.actions .btn { padding: 6px 12px; font-size: 0.75rem; }
.status-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    color: var(--text);
    font-size: 0.7rem;
}
.stats-bar {
    display: flex;
    gap: 16px;
    padding: 10px 16px;
    background: var(--section);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--muted);
    overflow-x: auto;
    white-space: nowrap;
}
.stats-bar span strong { color: var(--text); }
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.85rem;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
}
.toast.show { opacity: 1; }
.reset-bar { padding: 8px 16px; text-align: center; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn-reset {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--red);
    font-size: 0.7rem;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0.5;
}
.btn-reset:hover { opacity: 1; }
@media (max-width: 600px) {
    .lead-card .top { flex-direction: column; }
    .lead-card .actions { width: 100%; }
    .actions .btn { flex: 1; text-align: center; }
}
</style>

    const saved = localStorage.getItem('mskStatus');
    if (saved) statusMap = JSON.parse(saved);
} catch(e) {}

function getStatus(name) {
    return statusMap[name] || 'pending';
}
function setStatus(name, s) {
    statusMap[name] = s;
    localStorage.setItem('mskStatus', JSON.stringify(statusMap));
    renderStats();
}
function copyTemplate() {
    const ta = document.getElementById('msgTemplate');
    ta.select();
    document.execCommand('copy');
    showToast('Template copied!');
}
function resetTemplate() {
    document.getElementById('msgTemplate').value = "Hey [name], I noticed [business] does not have a website yet. Most people Google a business before calling - without a site you are losing customers. I build simple websites for local businesses. Want me to send you a demo link to check out?";
}
function personalizeMsg(name) {
    let msg = document.getElementById('msgTemplate').value;
    msg = msg.replace(/\[name\]/g, name.split(' ')[0]);
    msg = msg.replace(/\[business\]/g, name);
    return msg;
}
function smsLead(name, phone) {
    const body = personalizeMsg(name);
    const url = 'sms:' + phone + '?body=' + encodeURIComponent(body);
    window.location.href = url;
    setStatus(name, 'done');
    renderLeads();
}
function callLead(name, phone) {
    window.location.href = 'tel:' + phone;
}
function copyMsg(name) {
    const msg = personalizeMsg(name);
    navigator.clipboard.writeText(msg).then(() => {
        showToast('Message copied for ' + name.split(' ')[0]);
    });
}
function changeStatus(name, el) {
    setStatus(name, el.value);
    renderLeads();
}
function showToast(msg) {
    const t = document.getElementById('toast');

    t.classList.add('show');

}
function renderStats() {
    let sent = 0, replied = 0, interested = 0, meeting = 0, no = 0;
    Object.values(statusMap).forEach(s => {
        if (s === 'done') sent++;
        else if (s === 'replied') { replied++; sent++; }
        else if (s === 'interested') { interested++; sent++; }
        else if (s === 'meeting') { meeting++; sent++; }
        else if (s === 'no') { no++; sent++; }
    });
    const total = sent;
    document.getElementById('msgCount').textContent = total;
    document.getElementById('msgBar').style.width = Math.min(100, (total / 100) * 100) + '%';
    let potential = 570;
    interested > 0 && (potential += interested * 250);
    meeting > 0 && (potential += meeting * 250);
    document.getElementById('earnedCount').textContent = '£' + potential.toLocaleString();
    document.getElementById('earnedBar').style.width = Math.min(100, (potential / 5000) * 100) + '%';
    const callsMade = Object.keys(statusMap).length;
    document.getElementById('statsBar').innerHTML =
        'Sent: <strong>' + total + '</strong> &middot; ' +
        'Replied: <strong>' + replied + '</strong> &middot; ' +
        'Interested: <strong>' + interested + '</strong> &middot; ' +
        'Meeting: <strong>' + meeting + '</strong> &middot; ' +
        'No: <strong>' + no + '</strong> &middot; ' +
        'Called: <strong>' + callsMade + '</strong>';
}
function saveContact(name, phone, category) {
    const cleaned = phone.replace(/[^0-9]/g, '');
    const vcard = 'BEGIN:VCARD\nVERSION:3.0\nFN:' + name + '\nTEL;TYPE=CELL:' + cleaned + '\nNOTE:MSK Lead - ' + category + '\nEND:VCARD';
    const blob = new Blob([vcard], {type: 'text/vcard;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name.replace(/[^a-zA-Z0-9]/g, '_') + '.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Saved: ' + name.split(' ')[0]);
}
function saveAllFiltered() {
    const cards = document.querySelectorAll('.lead-card');
    if (cards.length === 0) { showToast('No leads visible'); return; }
    if (cards.length > 50 && !confirm('Save ' + cards.length + ' contacts?')) return;
    let vcards = [];
    cards.forEach(card => {
        const nameEl = card.querySelector('.name');
        if (!nameEl) return;
        const name = nameEl.textContent;
        const lead = LEADS.find(l => l.n === name);
        if (!lead || !lead.p) return;
        const cleaned = lead.p.replace(/[^0-9]/g, '');
        vcards.push('BEGIN:VCARD\nVERSION:3.0\nFN:' + name + '\nTEL;TYPE=CELL:' + cleaned + '\nNOTE:MSK Lead - ' + (lead.c || '') + '\nEND:VCARD');
    });
    if (vcards.length === 0) { showToast('No contacts to save'); return; }
    const blob = new Blob([vcards.join('\n')], {type: 'text/vcard;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'msk-leads.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Saved ' + vcards.length + ' contacts!');
}
function renderLeads() {
    const search = document.getElementById('search').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    let filtered = LEADS.filter(l => {
        if (cat && l.c !== cat) return false;
        if (search) {
            const q = search.toLowerCase();
            return l.n.toLowerCase().includes(q) || l.a.toLowerCase().includes(q);
        }
        return true;
    });
    document.getElementById('filterCount').textContent = filtered.length + ' leads';
    filtered.sort((a, b) => {
        const sa = getStatus(a.n);
        const sb = getStatus(b.n);
        const order = { pending: 0, done: 1, replied: 2, interested: 3, meeting: 4, no: 5 };
        const oa = order[sa] || 0;
        const ob = order[sb] || 0;
        if (oa !== ob) return oa - ob;
        return a.n.localeCompare(b.n);
    });
    let html = '';
    filtered.forEach(l => {
        const status = getStatus(l.n);
        const sClass = 'status-' + status;
        const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
        const addrParts = l.a.split(',');
        const town = addrParts.length >= 2 ? addrParts[addrParts.length-2].trim() : '';
        const safeName = l.n.replace(/'/g, "\'");
        html += '<div class="lead-card">' +
            '<div class="top">' +
                '<div class="info">' +
                    '<div class="name">' + l.n + '</div>' +
                    '<div class="category">' + l.c + ' &middot; ' + town + '</div>' +
                    '<div class="phone">' + l.p + ' <span style="color:var(--muted);font-size:0.65rem">| ' + l.a.split(',')[0] + '</span></div>' +
                '</div>' +
                '<span class="status ' + sClass + '">' + statusLabel + '</span>' +
            '</div>' +
            '<div class="actions">' +
                '<button class="btn btn-sms" onclick="smsLead(\'' + safeName + '\',\'' + l.p + '\')">SMS</button>' +
                '<button class="btn btn-call" onclick="callLead(\'' + safeName + '\',\'' + l.p + '\')">Call</button>' +
                '<button class="btn btn-outline" onclick="saveContact(\'' + safeName + '\',\'' + l.p + '\',\'' + l.c + '\')">Save</button>' +
                '<select class="status-select" onchange="changeStatus(\'' + safeName + '\', this)">' +
                    '<option value="pending"' + (status==='pending'?' selected':'') + '>Pending</option>' +
                    '<option value="done"' + (status==='done'?' selected':'') + '>Sent</option>' +
                    '<option value="replied"' + (status==='replied'?' selected':'') + '>Replied</option>' +
                    '<option value="interested"' + (status==='interested'?' selected':'') + '>Interested</option>' +
                    '<option value="meeting"' + (status==='meeting'?' selected':'') + '>Meeting</option>' +
                    '<option value="no"' + (status==='no'?' selected':'') + '>Not interested</option>' +
                '</select>' +
            '</div>' +
        '</div>';
    });
    document.getElementById('leadList').innerHTML = html;
    renderStats();
}
renderLeads();
</script>
